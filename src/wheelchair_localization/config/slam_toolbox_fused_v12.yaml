# ============================================================================
# SLAM Toolbox - FUSED v12: SHARPER WALLS + NO RAY STREAKS
# ============================================================================
# Created: 2026-02-24
#
# DO NOT EDIT — create a new versioned file (e.g., slam_toolbox_fused_v13.yaml)
#
# Based on: slam_toolbox_fused_v11.yaml (strict v7 rule baseline, WORKING)
#
# CHANGES FROM v11 (2 params — per tuning rule):
#   1. max_laser_range: 8.0 -> 5.0
#      Fixes: long ray streaks through doorways carving false free-space
#      5m covers all useful indoor geometry. Camera data maxes at ~3m anyway.
#
#   2. distance_variance_penalty: 0.90 -> 0.50
#      Fixes: thick/smeared walls from scan matcher wandering to noise peaks.
#      At 0.90 (v11): matcher freely wanders ±35cm (penalty at 0.5m = 0.944).
#      At 0.50 (v12): matcher anchored within ~43cm of EKF odom (penalty floor).
#      0.50 is the SLAM Toolbox default. With good EKF odom, this is safe.
#      Source: Karto SDK penalty = max(1.0 - 0.2*d²/σ², min_penalty)
#
# NOT YET DEPLOYED — setpoint only. To activate:
#   Update wheelchair_slam_mapping.launch.py default_slam_config_fused path
#
# Paired with: scan_fusion_v7.py (MIN fusion + MultiThreadedExecutor)
# ============================================================================

slam_toolbox:
  ros__parameters:

    # ========================================================================
    # SOLVER CONFIGURATION
    # ========================================================================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    # ========================================================================
    # ROS PARAMETERS
    # ========================================================================
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_fused
    use_map_saver: true
    mode: mapping

    resolution: 0.02

    # ========================================================================
    # PERFORMANCE PARAMETERS
    # ========================================================================
    debug_logging: false
    throttle_scans: 1

    transform_publish_period: 0.01    # 100Hz TF
    map_update_interval: 0.25         # Fast map updates
    minimum_time_interval: 0.03       # 30ms

    max_laser_range: 5.0              # v12 CHANGE: 8.0 -> 5.0 (kills doorway ray streaks)
    transform_timeout: 0.3
    tf_buffer_duration: 45.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ========================================================================
    # MOVEMENT THRESHOLDS
    # ========================================================================
    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.10     # 10cm
    minimum_travel_heading: 0.03      # ~1.7 degrees

    scan_buffer_size: 5
    scan_buffer_maximum_scan_distance: 10.0

    # ========================================================================
    # SCAN MATCHING QUALITY
    # ========================================================================
    link_match_minimum_response_fine: 0.50
    link_scan_maximum_distance: 0.8

    # ========================================================================
    # LOOP CLOSURE
    # ========================================================================
    do_loop_closing: true
    loop_search_maximum_distance: 15.0
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coarse: 4.0
    loop_match_minimum_response_coarse: 0.30
    loop_match_minimum_response_fine: 0.35

    # ========================================================================
    # CORRELATION SEARCH SPACE (Jetson proven)
    # ========================================================================
    correlation_search_space_dimension: 0.35
    correlation_search_space_resolution: 0.005
    correlation_search_space_smear_deviation: 0.03

    # ========================================================================
    # LOOP CLOSURE CORRELATION
    # ========================================================================
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ========================================================================
    # VARIANCE PENALTIES
    # ========================================================================
    distance_variance_penalty: 0.50   # v12 CHANGE: 0.90 -> 0.50 (SLAM Toolbox default, sharper walls)
    angle_variance_penalty: 0.90      # Keep for now — fix in v13

    # ========================================================================
    # SCAN MATCHER FINE-TUNING
    # ========================================================================
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.174
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.85
    minimum_distance_penalty: 0.85
    use_response_expansion: true
