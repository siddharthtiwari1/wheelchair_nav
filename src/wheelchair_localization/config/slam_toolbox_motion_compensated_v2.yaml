# ============================================================================
# SLAM Toolbox - MOTION COMPENSATED V2
# ============================================================================
# Created: 2026-02-24
# Based on: Jetson proven config (slam_toolbox_motion_compensated.yaml from
#   /opt/nvidia/home_data/Downloads/) + defensive improvements from v1
#
# DO NOT EDIT -- create a new versioned file
#
# CHANGE FROM V1:
#   Restored original Jetson correlation search space params (0.35/0.005/0.03).
#   V1 widened these to 1.0/0.01/0.05 thinking it would help loop closure,
#   but correlation_search_space controls SCAN-TO-SCAN matching, NOT loop
#   closure (which uses loop_search_space_dimension=10.0). The widening just
#   made scan matching fuzzier -> worse wall quality.
#
# KEPT FROM V1 (justified):
#   - transform_timeout: 0.3 (harmless, more robust for TF delays)
#   - tf_buffer_duration: 45.0 (more TF history is strictly better)
#
# Paired with: wheelchair_slam_mapping.launch.py (lidar-only default)
# ============================================================================

slam_toolbox:
  ros__parameters:

    # ========================================================================
    # SOLVER CONFIGURATION (same as v14r25)
    # ========================================================================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    # ========================================================================
    # ROS PARAMETERS
    # ========================================================================
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_filtered          # LiDAR-only (default)
    use_map_saver: true
    mode: mapping

    # Resolution - keep high quality
    resolution: 0.02

    # ========================================================================
    # PERFORMANCE PARAMETERS
    # ========================================================================
    debug_logging: false
    throttle_scans: 1

    transform_publish_period: 0.01    # 100Hz TF
    map_update_interval: 0.25         # Fast map updates

    # Process scans frequently - reduces motion distortion
    minimum_time_interval: 0.03       # 30ms

    max_laser_range: 12.0
    transform_timeout: 0.3            # Kept from v1 (defensive, harmless)
    tf_buffer_duration: 45.0          # Kept from v1 (more TF history)
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ========================================================================
    # MOVEMENT THRESHOLDS - MOTION-COMPENSATED (lower thresholds)
    # ========================================================================
    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.10     # 10cm
    minimum_travel_heading: 0.03      # ~1.7 degrees

    scan_buffer_size: 5               # Small buffer
    scan_buffer_maximum_scan_distance: 10.0

    # ========================================================================
    # SCAN MATCHING QUALITY
    # ========================================================================
    link_match_minimum_response_fine: 0.50  # Tight matching
    link_scan_maximum_distance: 0.8         # Short association radius

    # ========================================================================
    # LOOP CLOSURE
    # ========================================================================
    do_loop_closing: true
    loop_search_maximum_distance: 15.0
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coarse: 4.0
    loop_match_minimum_response_coarse: 0.30
    loop_match_minimum_response_fine: 0.35

    # ========================================================================
    # CORRELATION SEARCH SPACE - RESTORED JETSON PROVEN VALUES
    # ========================================================================
    # V1 mistake: widened to 1.0m thinking it helps loop closure.
    # Reality: correlation_search_space is for SCAN-TO-SCAN matching only.
    # Loop closure uses loop_search_space_dimension=10.0 (already large enough).
    # Tight 0.35m = precise walls. EKF odom is good enough for ±17.5cm search.
    correlation_search_space_dimension: 0.35    # RESTORED from Jetson
    correlation_search_space_resolution: 0.005  # RESTORED from Jetson (fine)
    correlation_search_space_smear_deviation: 0.03  # RESTORED from Jetson (tight)

    # ========================================================================
    # LOOP CLOSURE CORRELATION
    # ========================================================================
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ========================================================================
    # VARIANCE PENALTIES - TRUST EKF ODOMETRY
    # ========================================================================
    distance_variance_penalty: 0.90   # High odom trust
    angle_variance_penalty: 0.90      # Anchor to IMU yaw

    # ========================================================================
    # SCAN MATCHER FINE-TUNING
    # ========================================================================
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.174
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.85
    minimum_distance_penalty: 0.85
    use_response_expansion: true
