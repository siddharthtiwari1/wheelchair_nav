# ============================================================================
# SLAM Toolbox - FUSED v10: FAST TURNS — WIDER ANGULAR SEARCH + COARSER GRID
# ============================================================================
# Created: 2026-02-24
#
# DO NOT EDIT — create a new versioned file (e.g., slam_toolbox_fused_v11.yaml)
#
# Based on slam_toolbox_fused_v9.yaml (realtime speed)
#
# CHANGES FROM v9 (2 params — per tuning rule):
#   1. correlation_search_space_resolution: 0.005 -> 0.01
#      Old: 70x70 = 4900 position cells * ~10 angles = 49K evals per scan
#      New: 35x35 = 1225 position cells * ~20 angles = 25K evals per scan
#      ~2x faster scan matching. 1cm resolution still fine for 2cm map grid.
#
#   2. coarse_search_angle_offset: 0.174 -> 0.349
#      Old: ±10° — fails when wheelchair turns >10° between processed scans
#      New: ±20° — handles turns up to ~1.7 rad/s (very fast for wheelchair)
#      With async SLAM dropping scans during fast turns, the angular gap
#      between processed scans can exceed 10° easily. 20° gives margin.
#
# Net effect: scan matching is ~2x faster AND handles fast turns without stalling.
#
# Paired with: scan_fusion_v7.py (MIN fusion + MultiThreadedExecutor)
# ============================================================================

slam_toolbox:
  ros__parameters:

    # ========================================================================
    # SOLVER CONFIGURATION
    # ========================================================================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    # ========================================================================
    # ROS PARAMETERS
    # ========================================================================
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_fused
    use_map_saver: true
    mode: mapping

    resolution: 0.02

    # ========================================================================
    # PERFORMANCE PARAMETERS — REALTIME SPEED (from v9)
    # ========================================================================
    debug_logging: false
    throttle_scans: 1

    transform_publish_period: 0.01    # 100Hz TF
    map_update_interval: 0.1          # 10Hz map publish
    minimum_time_interval: 0.03       # 30ms between scan processing

    max_laser_range: 6.0
    transform_timeout: 0.3
    tf_buffer_duration: 45.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ========================================================================
    # MOVEMENT THRESHOLDS — TIGHT FOR RESPONSIVENESS (from v9)
    # ========================================================================
    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.05     # 5cm
    minimum_travel_heading: 0.03      # ~1.7 degrees

    scan_buffer_size: 5
    scan_buffer_maximum_scan_distance: 10.0

    # ========================================================================
    # SCAN MATCHING QUALITY
    # ========================================================================
    link_match_minimum_response_fine: 0.50
    link_scan_maximum_distance: 0.8

    # ========================================================================
    # LOOP CLOSURE
    # ========================================================================
    do_loop_closing: true
    loop_search_maximum_distance: 15.0
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coarse: 4.0
    loop_match_minimum_response_coarse: 0.30
    loop_match_minimum_response_fine: 0.35

    # ========================================================================
    # CORRELATION SEARCH SPACE — FASTER + TURN-ROBUST
    # ========================================================================
    correlation_search_space_dimension: 0.35
    correlation_search_space_resolution: 0.01    # v9 was 0.005 → 4x fewer cells
    correlation_search_space_smear_deviation: 0.03

    # ========================================================================
    # LOOP CLOSURE CORRELATION
    # ========================================================================
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ========================================================================
    # VARIANCE PENALTIES
    # ========================================================================
    distance_variance_penalty: 0.90
    angle_variance_penalty: 0.90

    # ========================================================================
    # SCAN MATCHER FINE-TUNING — WIDER ANGLE SEARCH FOR TURNS
    # ========================================================================
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349         # v9 was 0.174 (10°) → now 20°
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.85
    minimum_distance_penalty: 0.85
    use_response_expansion: true
