# ============================================================================
# SLAM Toolbox - FUSED v9: REALTIME SPEED — FASTER MAP UPDATES
# ============================================================================
# Created: 2026-02-24
#
# DO NOT EDIT — create a new versioned file (e.g., slam_toolbox_fused_v10.yaml)
#
# Based on slam_toolbox_fused_v8.yaml (Jetson-proven correlation)
#
# CHANGES FROM v8 (ONLY 2 params changed — per tuning rule):
#   1. map_update_interval: 0.25 -> 0.1  (map publishes 10Hz instead of 4Hz)
#   2. minimum_travel_distance: 0.10 -> 0.05  (process after 5cm instead of 10cm)
#
# WHY: v8 map felt slow because:
#   - 250ms between map publishes = 4 visual updates/sec (noticeable lag)
#   - 10cm travel threshold = wheelchair must move 10cm before SLAM processes
#     a new scan. At 0.25 m/s that's 400ms of dead time.
#   - Combined: up to 650ms visual lag → feels unresponsive
#   - With v9: 100ms publish + 5cm threshold → ~300ms worst case
#
# KEPT from v8 (all Jetson-proven):
#   - correlation_search_space: 0.35/0.005/0.03 (tight scan matching)
#   - resolution: 0.02 (high quality grid)
#   - minimum_time_interval: 0.03 (30ms — already fast)
#   - All solver, loop closure, variance penalty params unchanged
#
# Paired with: scan_fusion_v7.py (MIN fusion + PointCloud2 + MultiThreadedExecutor)
# ============================================================================

slam_toolbox:
  ros__parameters:

    # ========================================================================
    # SOLVER CONFIGURATION
    # ========================================================================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    # ========================================================================
    # ROS PARAMETERS
    # ========================================================================
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_fused
    use_map_saver: true
    mode: mapping

    resolution: 0.02

    # ========================================================================
    # PERFORMANCE PARAMETERS — REALTIME SPEED
    # ========================================================================
    debug_logging: false
    throttle_scans: 1

    transform_publish_period: 0.01    # 100Hz TF
    map_update_interval: 0.1          # 10Hz map publish (v8 was 0.25 = 4Hz)
    minimum_time_interval: 0.03       # 30ms between scan processing

    max_laser_range: 6.0              # Rear is cropped, cameras max 3.5m
    transform_timeout: 0.3
    tf_buffer_duration: 45.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ========================================================================
    # MOVEMENT THRESHOLDS — TIGHTER FOR RESPONSIVENESS
    # ========================================================================
    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.05     # 5cm (v8 was 0.10 — felt slow)
    minimum_travel_heading: 0.03      # ~1.7 degrees (unchanged)

    scan_buffer_size: 5
    scan_buffer_maximum_scan_distance: 10.0

    # ========================================================================
    # SCAN MATCHING QUALITY
    # ========================================================================
    link_match_minimum_response_fine: 0.50
    link_scan_maximum_distance: 0.8

    # ========================================================================
    # LOOP CLOSURE
    # ========================================================================
    do_loop_closing: true
    loop_search_maximum_distance: 15.0
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coarse: 4.0
    loop_match_minimum_response_coarse: 0.30
    loop_match_minimum_response_fine: 0.35

    # ========================================================================
    # CORRELATION SEARCH SPACE - JETSON PROVEN VALUES
    # ========================================================================
    correlation_search_space_dimension: 0.35
    correlation_search_space_resolution: 0.005
    correlation_search_space_smear_deviation: 0.03

    # ========================================================================
    # LOOP CLOSURE CORRELATION
    # ========================================================================
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ========================================================================
    # VARIANCE PENALTIES
    # ========================================================================
    distance_variance_penalty: 0.90
    angle_variance_penalty: 0.90

    # ========================================================================
    # SCAN MATCHER FINE-TUNING
    # ========================================================================
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.174
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.85
    minimum_distance_penalty: 0.85
    use_response_expansion: true
