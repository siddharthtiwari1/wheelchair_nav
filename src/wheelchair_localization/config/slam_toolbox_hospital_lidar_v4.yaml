# ============================================================================
# SLAM Toolbox - HOSPITAL LIDAR V4: 30m RANGE FOR PERFECT CORRIDOR MAPS
# ============================================================================
# Created: 2026-03-09
#
# DO NOT EDIT — create a new versioned file (e.g., slam_toolbox_hospital_lidar_v5.yaml)
#
# Based on: slam_toolbox_hospital_lidar_v3.yaml (15m, rotation-safe)
#
# WHY 30m:
#   Hospital corridors can be 30m+ long. Using the full RPLidar S3 range
#   captures far-wall structure that helps loop closure and produces a
#   geometrically complete map. The previous 15m cap dropped corridor
#   endpoints.
#
# RISK: ROTATION AT LONG RANGE
#   At 30m, a 7.7° scan-to-scan rotation = 4.0m far-point displacement
#   The 0.35m correlation search space cannot track this.
#   MITIGATION: Drive straight through corridors (translation dominates).
#   Rotate ONLY in narrow areas (rooms, junctions) where max visible
#   range is naturally <10m and close-range points anchor the match.
#
#   *** DO NOT ROTATE IN-PLACE IN OPEN CORRIDORS ***
#   *** ROTATE ONLY AT JUNCTIONS/NARROW AREAS ***
#
# TOTAL changes from v3 baseline: 1 (V7 rule: max 2 param changes)
#   1. max_laser_range: 15.0 → 30.0
#
# Paired with: laser_filter_hospital_v2.yaml + hospital_mode:=true
# ============================================================================

slam_toolbox:
  ros__parameters:

    # ========================================================================
    # SOLVER CONFIGURATION (identical to v3)
    # ========================================================================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    # ========================================================================
    # ROS PARAMETERS
    # ========================================================================
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_filtered
    use_map_saver: true
    mode: mapping

    resolution: 0.02

    # ========================================================================
    # PERFORMANCE PARAMETERS
    # ========================================================================
    debug_logging: false
    throttle_scans: 1

    transform_publish_period: 0.01
    map_update_interval: 0.25
    minimum_time_interval: 0.03

    max_laser_range: 30.0             # *** V4: 15.0 → 30.0 (full corridor range) ***
    transform_timeout: 0.3
    tf_buffer_duration: 45.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ========================================================================
    # MOVEMENT THRESHOLDS (identical to v3)
    # ========================================================================
    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.10
    minimum_travel_heading: 0.03

    scan_buffer_size: 5
    scan_buffer_maximum_scan_distance: 10.0

    # ========================================================================
    # SCAN MATCHING QUALITY (identical to v3)
    # ========================================================================
    link_match_minimum_response_fine: 0.50
    link_scan_maximum_distance: 0.8

    # ========================================================================
    # LOOP CLOSURE — HOSPITAL (identical to v3)
    # ========================================================================
    do_loop_closing: true
    loop_search_maximum_distance: 30.0
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coarse: 4.0
    loop_match_minimum_response_coarse: 0.30
    loop_match_minimum_response_fine: 0.35

    # ========================================================================
    # CORRELATION SEARCH SPACE — JETSON PROVEN (identical to v3)
    # ========================================================================
    # DO NOT widen — v2 proved wider search finds false matches at long range
    correlation_search_space_dimension: 0.35
    correlation_search_space_resolution: 0.005
    correlation_search_space_smear_deviation: 0.03

    # ========================================================================
    # LOOP CLOSURE CORRELATION (identical to v3)
    # ========================================================================
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ========================================================================
    # VARIANCE PENALTIES (identical to v3)
    # ========================================================================
    distance_variance_penalty: 0.90
    angle_variance_penalty: 0.90

    # ========================================================================
    # SCAN MATCHER FINE-TUNING (identical to v3)
    # ========================================================================
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.174     # 10° — DO NOT widen (v2 proved this)
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.85
    minimum_distance_penalty: 0.85
    use_response_expansion: true
