# ============================================================================
# SLAM Toolbox - HOSPITAL LIDAR V2: ROTATION-SAFE 25m
# ============================================================================
# Created: 2026-03-08
#
# DO NOT EDIT — create a new versioned file (e.g., slam_toolbox_hospital_lidar_v3.yaml)
#
# Based on: slam_toolbox_hospital_lidar.yaml (25m range, 30m loop search)
#
# BUG FIX: Hospital v1 tore the map during 360° in-place rotation.
# Root cause: At 25m, 1° angular error = 43cm displacement at far points,
#   exceeding the 0.35m correlation search space. Scan matcher loses lock.
#
# V2 CHANGE (1 param from hospital v1):
#   coarse_search_angle_offset: 0.174 (10°) → 0.349 (20°)
#   Wider angular search catches rotation during in-place turns.
#
# TOTAL changes from proven v2 baseline: 3
#   1. max_laser_range: 12.0 → 25.0 (hospital range)
#   2. loop_search_maximum_distance: 15.0 → 30.0 (hospital corridors)
#   3. coarse_search_angle_offset: 0.174 → 0.349 (rotation safety)
#
# Paired with: laser_filter_hospital.yaml + wheelchair_slam_mapping.launch.py hospital_mode:=true
# ============================================================================

slam_toolbox:
  ros__parameters:

    # ========================================================================
    # SOLVER CONFIGURATION (identical to v2)
    # ========================================================================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    # ========================================================================
    # ROS PARAMETERS
    # ========================================================================
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_filtered
    use_map_saver: true
    mode: mapping

    resolution: 0.02

    # ========================================================================
    # PERFORMANCE PARAMETERS
    # ========================================================================
    debug_logging: false
    throttle_scans: 1

    transform_publish_period: 0.01
    map_update_interval: 0.25
    minimum_time_interval: 0.03

    max_laser_range: 25.0             # HOSPITAL: full RPLidar S3 range
    transform_timeout: 0.3
    tf_buffer_duration: 45.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ========================================================================
    # MOVEMENT THRESHOLDS (identical to v2)
    # ========================================================================
    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.10
    minimum_travel_heading: 0.03

    scan_buffer_size: 5
    scan_buffer_maximum_scan_distance: 10.0

    # ========================================================================
    # SCAN MATCHING QUALITY (identical to v2)
    # ========================================================================
    link_match_minimum_response_fine: 0.50
    link_scan_maximum_distance: 0.8

    # ========================================================================
    # LOOP CLOSURE — HOSPITAL
    # ========================================================================
    do_loop_closing: true
    loop_search_maximum_distance: 30.0   # HOSPITAL: long corridors
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coarse: 4.0
    loop_match_minimum_response_coarse: 0.30
    loop_match_minimum_response_fine: 0.35

    # ========================================================================
    # CORRELATION SEARCH SPACE — JETSON PROVEN
    # ========================================================================
    correlation_search_space_dimension: 0.35
    correlation_search_space_resolution: 0.005
    correlation_search_space_smear_deviation: 0.03

    # ========================================================================
    # LOOP CLOSURE CORRELATION (identical to v2)
    # ========================================================================
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ========================================================================
    # VARIANCE PENALTIES (identical to v2)
    # ========================================================================
    distance_variance_penalty: 0.90
    angle_variance_penalty: 0.90

    # ========================================================================
    # SCAN MATCHER FINE-TUNING — V2 FIX: WIDER ANGULAR SEARCH
    # ========================================================================
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349    # *** V2 FIX: 10° → 20° for rotation safety ***
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.85
    minimum_distance_penalty: 0.85
    use_response_expansion: true
