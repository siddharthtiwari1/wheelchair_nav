# ============================================================================
# SLAM Toolbox - FUSED v8: RESTORED JETSON CORRELATION + REAR CROP
# ============================================================================
# Created: 2026-02-24
#
# DO NOT EDIT — create a new versioned file (e.g., slam_toolbox_fused_v9.yaml)
#
# Based on slam_toolbox_fused_v7.yaml + slam_toolbox_motion_compensated_v2.yaml
#
# CHANGES FROM v7:
#   1. Restored Jetson-proven correlation search space (0.35/0.005/0.03)
#      V7 had 1.0/0.01/0.05 which makes scan-to-scan matching fuzzy.
#      correlation_search_space is for SEQUENTIAL scans, NOT loop closure.
#      Loop closure uses loop_search_space_dimension=10.0 (already fine).
#   2. max_laser_range reduced to 6.0 (scan_fusion_v5 rear crop at ±135°
#      means rear bins are inf → camera fills them. No point telling SLAM
#      to look for 8m ranges that come from cropped rear.)
#
# Paired with: scan_fusion_v5.py (rear crop + camera gap-fill)
# ============================================================================

slam_toolbox:
  ros__parameters:

    # ========================================================================
    # SOLVER CONFIGURATION
    # ========================================================================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    # ========================================================================
    # ROS PARAMETERS
    # ========================================================================
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_fused
    use_map_saver: true
    mode: mapping

    resolution: 0.02

    # ========================================================================
    # PERFORMANCE PARAMETERS
    # ========================================================================
    debug_logging: false
    throttle_scans: 1

    transform_publish_period: 0.01    # 100Hz TF
    map_update_interval: 0.25
    minimum_time_interval: 0.03       # 30ms

    max_laser_range: 6.0              # Reduced from 8.0 — rear is cropped, cameras max 2m
    transform_timeout: 0.3
    tf_buffer_duration: 45.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ========================================================================
    # MOVEMENT THRESHOLDS
    # ========================================================================
    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.10
    minimum_travel_heading: 0.03

    scan_buffer_size: 5
    scan_buffer_maximum_scan_distance: 10.0

    # ========================================================================
    # SCAN MATCHING QUALITY
    # ========================================================================
    link_match_minimum_response_fine: 0.50
    link_scan_maximum_distance: 0.8

    # ========================================================================
    # LOOP CLOSURE
    # ========================================================================
    do_loop_closing: true
    loop_search_maximum_distance: 15.0
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coarse: 4.0
    loop_match_minimum_response_coarse: 0.30
    loop_match_minimum_response_fine: 0.35

    # ========================================================================
    # CORRELATION SEARCH SPACE - RESTORED JETSON PROVEN VALUES
    # ========================================================================
    # V7 had 1.0/0.01/0.05 — too wide, fuzzier walls.
    # 0.35m is enough for scan-to-scan (EKF odom is good).
    correlation_search_space_dimension: 0.35
    correlation_search_space_resolution: 0.005
    correlation_search_space_smear_deviation: 0.03

    # ========================================================================
    # LOOP CLOSURE CORRELATION
    # ========================================================================
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ========================================================================
    # VARIANCE PENALTIES
    # ========================================================================
    distance_variance_penalty: 0.90
    angle_variance_penalty: 0.90

    # ========================================================================
    # SCAN MATCHER FINE-TUNING
    # ========================================================================
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.174
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.85
    minimum_distance_penalty: 0.85
    use_response_expansion: true
