# Depth Anything V2 vs RealSense evaluation node parameters.
# DO NOT EDIT — create a new versioned file if tuning needed.
# Pairs with: depth_eval_node.py, depth_eval.launch.py
depth_eval_node:
  ros__parameters:
    # Model
    hf_model_id: 'depth-anything/Depth-Anything-V2-Metric-Indoor-Small-hf'
    hf_cache_dir: ''

    # Input topics (front camera + lidar)
    rgb_topic: '/camera/color/image_raw'
    aligned_depth_topic: '/camera/aligned_depth_to_color/image_raw'
    camera_info_topic: '/camera/color/camera_info'
    lidar_scan_topic: '/scan_filtered'
    camera_scan_topic: '/scan_front_camera'

    # Evaluation
    eval_hz: 2.0
    max_depth_m: 6.0
    virtual_scan_stride: 4
    virtual_scan_min_height: 0.10
    virtual_scan_max_height: 1.80

    # LiDAR correction
    ransac_residual_threshold_m: 0.10
    min_lidar_overlap_points: 20

    # Output
    output_dir: '/home/sidd/wheelchair_nav/eval_output/depth_eval'
    viz_every_n_frames: 10
