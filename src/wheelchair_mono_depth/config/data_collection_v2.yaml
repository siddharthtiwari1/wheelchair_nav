# DO NOT EDIT — create a new versioned file if changes are needed.
# Data collection config v2: adds odometry dedup + per-camera max depth.
# Changed from data_collection.yaml: added dedup params, per-camera depth clipping.
# Pairs with: wheelchair_mono_depth/data_collection_node.py

depth_data_collection_node:
  ros__parameters:
    save_rate_hz: 3.0
    output_dir: "/home/sidd/wheelchair_nav/mono_depth_data"
    session_id: ""
    max_depth_mm: 10000      # global fallback (per-camera limits override in code)
    min_depth_mm: 100
    sync_queue_size: 10
    sync_slop: 0.15

    # Odometry-based dedup (skip frames if robot hasn't moved enough)
    dedup_min_distance: 0.01   # meters — skip if displacement < this
    dedup_min_angle_deg: 1.0   # degrees — AND rotation < this

    # Per-camera max depth is hardcoded in the node:
    #   D455 (front, left): 6000mm — reliable (36mm error @3m, 49mm @3.5m)
    #   D435i (right):      2500mm — noisier (68mm @3m, 92mm @3.5m, 1.9x worse)

    # Front D455
    front_rgb_topic: "/camera/color/image_raw"
    front_depth_topic: "/camera/aligned_depth_to_color/image_raw"
    front_info_topic: "/camera/color/camera_info"

    # Left D455
    left_rgb_topic: "/mapping_camera/color/image_raw"
    left_depth_topic: "/mapping_camera/aligned_depth_to_color/image_raw"
    left_info_topic: "/mapping_camera/color/camera_info"

    # Right D435i
    right_rgb_topic: "/right_camera/color/image_raw"
    right_depth_topic: "/right_camera/aligned_depth_to_color/image_raw"
    right_info_topic: "/right_camera/color/camera_info"

    odom_topic: "/odometry/filtered"
