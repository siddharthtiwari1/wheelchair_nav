# Monocular depth inference config for 3 cameras.
# Topics are mapped to match RealSense output for transparent swap.

mono_depth_front:
  ros__parameters:
    model_path: "/home/sidd/wheelchair_nav/models/mono_depth_vits_fp16.engine"
    use_tensorrt: true
    encoder: "vits"
    max_depth: 10.0
    input_size: 518
    camera_name: "front"
    rgb_topic: "/camera/color/image_raw"
    output_depth_topic: "/camera/depth/image_rect_raw"
    output_info_topic: "/camera/depth/camera_info"
    publish_pointcloud: true
    pointcloud_topic: "/camera/depth/color/points"
    inference_hz: 15.0
    intrinsics_file: ""

