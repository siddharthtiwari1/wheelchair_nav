# DO NOT EDIT — create a new versioned file if changes are needed.
# Round-robin multi-camera inference config for mono_depth_multi_node.
# Changed from inference.yaml: single node (not 3), max_depth 10->6, added cycle_interval_ms.
# Pairs with: wheelchair_mono_depth/inference/mono_depth_multi_node.py

mono_depth_multi_node:
  ros__parameters:
    # Model
    model_path: "/home/sidd/wheelchair_nav/models/mono_depth_vits_fp16.engine"
    use_tensorrt: true
    encoder: "vits"
    max_depth: 6.0             # wheelchair range (reduced from 10.0)
    input_size: 518
    cycle_interval_ms: 33.0    # ~30Hz total, ~10Hz per camera
    publish_pointcloud: true

    # Front D455
    front_rgb_topic: "/camera/color/image_raw"
    front_depth_topic: "/camera/depth/image_rect_raw"
    front_info_topic: "/camera/depth/camera_info"
    front_pc_topic: "/camera/depth/color/points"
    front_intrinsics: ""       # optional: path to intrinsics.json from data collection

    # Left D455
    left_rgb_topic: "/mapping_camera/color/image_raw"
    left_depth_topic: "/mapping_camera/depth/image_rect_raw"
    left_info_topic: "/mapping_camera/depth/camera_info"
    left_pc_topic: "/mapping_camera/depth/color/points"
    left_intrinsics: ""

    # Right D435i
    right_rgb_topic: "/right_camera/color/image_raw"
    right_depth_topic: "/right_camera/depth/image_rect_raw"
    right_info_topic: "/right_camera/depth/camera_info"
    right_pc_topic: "/right_camera/depth/color/points"
    right_intrinsics: ""
