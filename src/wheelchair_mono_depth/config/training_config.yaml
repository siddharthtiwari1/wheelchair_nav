# Depth Anything V2 fine-tuning hyperparameters (reference)
# These are passed as CLI args to train.py, this file is for documentation.

training:
  encoder: "vits"           # vits (24.8M, Jetson), vitb (97.5M), vitl (304M)
  max_depth: 10.0           # meters
  input_size: 518           # must be multiple of 14 (ViT patch size)
  epochs: 30
  batch_size: 8             # 8 for RTX 5050 8GB, 32 for RTX 3090 24GB
  lr: 5.0e-5                # decoder learning rate
  encoder_lr_scale: 0.1     # encoder LR = lr * 0.1 = 5e-6
  weight_decay: 0.01
  lambda_silog: 1.0
  lambda_l1: 0.1
  val_ratio: 0.1            # 10% sessions for validation
  num_workers: 4
  use_amp: true             # mixed precision (fp16)

# Pretrained model download:
#   vits: https://huggingface.co/depth-anything/Depth-Anything-V2-Metric-Indoor-Small-hf
#   vitb: https://huggingface.co/depth-anything/Depth-Anything-V2-Metric-Indoor-Base-hf
