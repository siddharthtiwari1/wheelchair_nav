###############################################################################
# NAV2 PARAMETERS - 3-CAMERA SAFE WHEELCHAIR CONFIGURATION (v5)
###############################################################################
# DO NOT EDIT — create a new versioned file instead.
# Based on: nav2_params_3cam_v4.yaml
# Created: 2026-02-26
# Pairs with: wheelchair_fusion_nav.launch.py, scan_fusion_v9, 3x RealSense
#
# CHANGES vs v4 (PERFORMANCE — fixes PC hanging under load):
# 1. publish_voxel_map: true → false (STVL was publishing entire 3D voxel grid
#    every cycle — massive CPU/RAM drain, only useful for RViz debugging)
# 2. always_send_full_costmap: true → false (BOTH local + global costmaps)
#    (was publishing full 5m×5m grid at 2Hz instead of incremental updates)
#
# PRESERVED from v4:
# - All AMCL, RPP, STVL, obstacle layer settings unchanged
# - velocity_smoother min_velocity [-0.05, 0.0, -0.35]
# - allow_reversing: true, use_rotate_to_heading: false
# - use_collision_detection: false
# - recovery_alpha_fast: 0.0
###############################################################################

###############################################################################
# AMCL - RPLIDAR S3 OPTIMIZED
###############################################################################
amcl:
  ros__parameters:
    use_sim_time: false
    min_particles: 3000
    max_particles: 8000
    kld_err: 0.01
    kld_z: 0.99
    pf_err: 0.01
    pf_z: 0.99
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.02
    alpha2: 0.02
    alpha3: 0.04
    alpha4: 0.02
    alpha5: 0.02
    laser_model_type: "likelihood_field"
    max_beams: 360
    laser_max_range: 25.0
    laser_min_range: 0.05
    laser_likelihood_max_dist: 2.0
    sigma_hit: 0.05
    z_hit: 0.95
    z_rand: 0.04
    z_max: 0.005
    z_short: 0.005
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9
    update_min_d: 0.05
    update_min_a: 0.05
    laser_scan_timeout: 1.0
    recovery_alpha_fast: 0.0       # DISABLED: prevents AMCL jumping
    recovery_alpha_slow: 0.0
    tf_broadcast: true
    transform_tolerance: 1.0
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    scan_topic: /scan_fused        # v3+: matches fused map (built with scan_fusion_v9)
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    initial_cov_xx: 0.15
    initial_cov_yy: 0.15
    initial_cov_aa: 0.12
    initial_cov_xy: 0.0
    initial_cov_xa: 0.0
    initial_cov_ya: 0.0
    always_reset_initial_pose: false
    first_map_only: false
    save_pose_rate: 10.0
    gui_publish_rate: 5.0

###############################################################################
# BT NAVIGATOR
###############################################################################
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 60.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    transform_tolerance: 1.0
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

###############################################################################
# CONTROLLER SERVER - SAFE PATH FOLLOWING
###############################################################################
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0

    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 4.0

    goal_checker_plugins: ["general_goal_checker"]
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 6.28    # Accept ANY orientation
      stateful: true

    controller_plugins: ["FollowPath"]
    odom_topic: /odometry/filtered

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.25
      max_linear_accel: 0.25
      max_linear_decel: 0.50
      lookahead_dist: 0.70
      min_lookahead_dist: 0.50
      max_lookahead_dist: 1.20
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false
      use_rotate_to_heading: false           # v4 FIX: must be false when allow_reversing=true
      rotate_to_heading_min_angle: 0.35
      rotate_to_heading_angular_vel: 0.5
      max_angular_accel: 0.8
      allow_reversing: true                  # Wheelchair can reverse slowly (capped by velocity_smoother)
      transform_tolerance: 1.0
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false          # DISABLED: phantom STVL obstacles caused NoValidControl
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.2
      regulated_linear_scaling_min_speed: 0.15
      cost_scaling_dist: 0.25
      cost_scaling_gain: 0.8
      inflation_cost_scaling_factor: 2.5
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.35
      max_robot_pose_search_dist: 10.0
      interpolate_curvature_after_goal: false

###############################################################################
# LOCAL COSTMAP - LiDAR + 3-Camera STVL (reactive obstacle avoidance)
###############################################################################
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35]]"
      footprint_padding: 0.03
      transform_tolerance: 1.0
      plugins: ["stvl_layer", "obstacle_layer", "inflation_layer"]

      # STVL - 3-camera 3D obstacle detection (fast 3s decay for reactive avoidance)
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 3.0            # 3s decay — fast clearing for local costmap
        decay_model: 0
        voxel_size: 0.05
        track_unknown_space: false
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: false     # v5 FIX: was true — publishing entire 3D voxel grid killed CPU/RAM
        transform_tolerance: 0.5
        mapping_mode: false
        map_save_duration: 60.0
        observation_sources: front_camera left_camera right_camera

        front_camera:
          data_type: PointCloud2
          topic: /camera/depth/color/points
          marking: true
          clearing: true
          obstacle_range: 3.5
          obstacle_max_range: 4.0
          obstacle_min_range: 0.85
          min_obstacle_height: 0.15
          max_obstacle_height: 1.80
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel"
          voxel_min_points: 2       # FIX: require 2-point agreement (was 0 — single noise point = phantom)
          clear_after_reading: true
          max_z: 7.0
          min_z: 0.15
          vertical_fov_angle: 1.012
          horizontal_fov_angle: 1.518
          decay_acceleration: 10.0
          model_type: 0

        left_camera:
          data_type: PointCloud2
          topic: /mapping_camera/depth/color/points
          marking: true
          clearing: true
          obstacle_range: 3.5
          obstacle_max_range: 4.0
          obstacle_min_range: 0.50
          min_obstacle_height: 0.15
          max_obstacle_height: 1.80
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel"
          voxel_min_points: 2       # FIX: require 2-point agreement
          clear_after_reading: true
          max_z: 7.0
          min_z: 0.15
          vertical_fov_angle: 1.012
          horizontal_fov_angle: 1.518
          decay_acceleration: 10.0
          model_type: 0

        right_camera:
          data_type: PointCloud2
          topic: /right_camera/depth/color/points
          marking: true
          clearing: true
          obstacle_range: 3.5
          obstacle_max_range: 4.0
          obstacle_min_range: 0.50
          min_obstacle_height: 0.15
          max_obstacle_height: 1.80
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel"
          voxel_min_points: 2       # FIX: require 2-point agreement
          clear_after_reading: true
          max_z: 7.0
          min_z: 0.15
          vertical_fov_angle: 1.012
          horizontal_fov_angle: 1.518
          decay_acceleration: 10.0
          model_type: 0

      # LiDAR obstacle layer — /scan_filtered only (no fusion noise)
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        combination_method: 1

        scan:
          topic: /scan_filtered    # Lidar-only: no camera fusion noise
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.30
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.25

      always_send_full_costmap: false  # v5 FIX: was true — sent full 5m×5m grid every cycle instead of diffs
      track_unknown_space: true

###############################################################################
# GLOBAL COSTMAP - LiDAR ONLY (no STVL — prevents phantom persistence)
###############################################################################
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      footprint: "[[0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35]]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 1.0
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
        map_topic: /map

      # LiDAR obstacle layer — /scan_filtered only
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan

        scan:
          topic: /scan_filtered    # Lidar-only: no camera fusion noise
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.25

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.28

      always_send_full_costmap: false  # v5 FIX: was true — full map every cycle is wasteful

###############################################################################
# PLANNER SERVER
###############################################################################
planner_server:
  ros__parameters:
    expected_planner_frequency: 1.5
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.10
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false

      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

###############################################################################
# SMOOTHER SERVER
###############################################################################
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 2000
      do_refinement: true
      refinement_num: 3
      w_smooth: 0.4
      w_data: 0.2

###############################################################################
# BEHAVIOR SERVER - WHEELCHAIR-SAFE RECOVERY
###############################################################################
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    use_sim_time: false
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 1.0
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.35
    min_rotational_vel: 0.10
    rotational_acc_lim: 0.5

###############################################################################
# VELOCITY SMOOTHER - PASSENGER COMFORT
###############################################################################
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 40.0
    scale_velocities: true
    feedback: "OPEN_LOOP"
    max_velocity: [0.25, 0.0, 0.35]
    min_velocity: [-0.05, 0.0, -0.35]   # v4: reduced from -0.12 to -0.05 m/s reverse
    max_accel: [0.15, 0.0, 0.6]
    max_decel: [-0.25, 0.0, -0.8]
    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.0, 0.02]
    velocity_timeout: 1.0

###############################################################################
# WAYPOINT FOLLOWER
###############################################################################
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

###############################################################################
# COLLISION MONITOR (currently disabled via launch arg, wired for future use)
###############################################################################
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel"
    cmd_vel_out_topic: "cmd_vel_safe"
    state_topic: "collision_monitor_state"
    transform_tolerance: 1.0
    source_timeout: 2.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["StopZone", "SlowdownZone"]
    StopZone:
      type: "polygon"
      points: [0.55, 0.42, 0.55, -0.42, -0.55, -0.42, -0.55, 0.42]
      action_type: "stop"
      max_points: 3
      visualize: true
      polygon_pub_topic: "polygon_stop"
    SlowdownZone:
      type: "polygon"
      points: [0.95, 0.82, 0.95, -0.82, -0.95, -0.82, -0.95, 0.82]
      action_type: "slowdown"
      max_points: 3
      slowdown_ratio: 0.3
      visualize: true
      polygon_pub_topic: "polygon_slowdown"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan_filtered"
      min_range: 0.10
      max_range: 10.0
