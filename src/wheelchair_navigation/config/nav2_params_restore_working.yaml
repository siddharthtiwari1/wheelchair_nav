###############################################################################
# NAV2 PARAMETERS - ROBUST FAST CONVERGENCE WHEELCHAIR CONFIGURATION
###############################################################################
# Created: 2026-01-12
# Purpose: ROBUST navigation with FAST goal convergence and QUICK recovery
#
# KEY OPTIMIZATIONS (vs old config):
# 1. FAST stuck detection: 5s (was 30s!)
# 2. QUICK server timeouts: 20-60s (was 900s!)
# 3. AGGRESSIVE replanning: 1.5Hz for dynamic obstacles
# 4. FAST approach: maintain speed until 20cm from goal
# 5. use_rotate_to_heading: FALSE (prevents stuck rotation!)
# 6. min_y_velocity_threshold: 0.001 (was 0.5 - wrong for diff drive!)
#
# TESTED LIMITS:
# - Max comfortable linear: 0.25 m/s
# - Max comfortable angular: 0.55 rad/s
###############################################################################

###############################################################################
# AMCL - EXPERT CONFIGURATION FOR RPLIDAR S3 + i5 13TH GEN
###############################################################################
# OPTIMIZED: 2026-01-13 by AMCL Expert
# Hardware: RPLidar S3 (32kHz, 10Hz, 40m range, 0.1125° resolution)
# CPU: Intel i5 13th Gen HX (can handle 10k+ particles easily)
#
# KEY FIXES TO PREVENT ROBOT JUMPING:
# 1. DISABLED aggressive recovery (recovery_alpha_fast: 0.0)
#    - Prevents random particle injection causing position jumps
#    - Jumping was caused by false-positive kidnapped robot detection
# 2. HIGH particle count (3000-8000) for robust localization
# 3. TIGHT sigma_hit (0.05) for RPLidar S3 accuracy
# 4. 360 beams to use full RPLidar S3 resolution
#
# References:
# - Nav2 AMCL: https://docs.nav2.org/configuration/packages/configuring-amcl.html
# - GitHub Issue #3117: Robot jumping caused by recovery params
# - RPLidar S3 specs: https://www.slamtec.com/en/S3
###############################################################################
amcl:
  ros__parameters:
    use_sim_time: false

    # =========================================================================
    # PARTICLE FILTER - HIGH COUNT FOR i5 13TH GEN
    # =========================================================================
    # With i5 13th gen HX, we can afford high particle counts for rock-solid localization
    min_particles: 3000                   # HIGH: ensures stable tracking (was 500)
    max_particles: 8000                   # HIGH: handles uncertainty well (was 2000)

    # KLD sampling - adaptive particle count
    kld_err: 0.01                         # 1% error tolerance
    kld_z: 0.99                           # 99% confidence

    # Particle filter tuning
    pf_err: 0.01                          # 1% target error
    pf_z: 0.99                            # 99% confidence
    resample_interval: 1                  # Resample every update

    # =========================================================================
    # MOTION MODEL - TRUST EKF-FUSED ODOMETRY
    # =========================================================================
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # LOW alpha = HIGH trust in EKF odometry (wheel encoders + IMU fusion)
    # These values assume good odometry from robot_localization EKF
    alpha1: 0.02                          # Rotation error from rotation
    alpha2: 0.02                          # Rotation error from translation
    alpha3: 0.04                          # Translation error from translation
    alpha4: 0.02                          # Translation error from rotation
    alpha5: 0.02                          # Strafe error (diff-drive = minimal)

    # =========================================================================
    # RPLIDAR S3 LASER MODEL - OPTIMIZED FOR HIGH ACCURACY
    # =========================================================================
    # RPLidar S3: 32kHz, 0.1125° resolution, ±3cm accuracy at 40m
    laser_model_type: "likelihood_field"

    max_beams: 360                        # FULL RESOLUTION: 360 beams (was 180)
    laser_max_range: 25.0                 # Indoor range (S3 can do 40m)
    laser_min_range: 0.05                 # 5cm minimum

    # Likelihood field parameters - TIGHT for S3 accuracy
    laser_likelihood_max_dist: 2.0        # 2m obstacle inflation (handles minor map errors)
    sigma_hit: 0.05                       # TIGHT: 5cm std dev (S3 is very accurate)

    # Measurement weights - HIGH trust in S3 LiDAR
    z_hit: 0.95                           # 95% trust in valid hits
    z_rand: 0.04                          # 4% random noise allowance
    z_max: 0.005                          # 0.5% max-range readings
    z_short: 0.005                        # 0.5% short readings

    # Beam skipping - DISABLED for consistent localization
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    # =========================================================================
    # UPDATE THRESHOLDS - BALANCED FOR CPU LOAD
    # =========================================================================
    # FIXED: 0.01m was TOO AGGRESSIVE causing AMCL to become stale!
    # With 8000 particles, updating every 1cm overloads the filter
    update_min_d: 0.05                    # Update every 5cm (was 1cm - too aggressive!)
    update_min_a: 0.05                    # Update every ~3 degrees (was 1.1 deg)

    # Scan timeout - prevents stale AMCL when scans are delayed
    laser_scan_timeout: 1.0               # ADDED: 1s timeout (default was 0.15s)

    # =========================================================================
    # RECOVERY - DISABLED TO PREVENT JUMPING
    # =========================================================================
    # CRITICAL: These were causing the robot to jump!
    # recovery_alpha_fast: 0.1 was too aggressive, causing false positives
    # when dynamic obstacles or minor scan mismatches occurred
    #
    # Setting to 0.0 DISABLES kidnapped robot detection but PREVENTS jumping
    # If you need kidnapped robot recovery, use very conservative values:
    # recovery_alpha_fast: 0.05, recovery_alpha_slow: 0.0001
    recovery_alpha_fast: 0.0              # DISABLED: prevents random jumps
    recovery_alpha_slow: 0.0              # DISABLED: prevents random jumps

    # =========================================================================
    # FRAME & TF CONFIGURATION
    # =========================================================================
    tf_broadcast: true
    transform_tolerance: 1.0              # 1s tolerance for compute delays

    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    scan_topic: /scan_filtered

    # =========================================================================
    # INITIAL POSE
    # =========================================================================
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # Moderate initial uncertainty (converges quickly with 8000 particles)
    initial_cov_xx: 0.15                  # ~39cm X spread
    initial_cov_yy: 0.15                  # ~39cm Y spread
    initial_cov_aa: 0.12                  # ~20 degrees yaw spread
    initial_cov_xy: 0.0
    initial_cov_xa: 0.0
    initial_cov_ya: 0.0

    # =========================================================================
    # ADVANCED SETTINGS
    # =========================================================================
    always_reset_initial_pose: false
    first_map_only: false
    save_pose_rate: 10.0                  # 10Hz pose saves
    gui_publish_rate: 5.0                 # 5Hz particle cloud (for RViz)

###############################################################################
# BT NAVIGATOR - OPTIMIZED TIMEOUTS
###############################################################################
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered

    # CRITICAL: Fast BT response (FIXED from old slow values)
    bt_loop_duration: 10                  # 10ms BT tick rate (fast)
    default_server_timeout: 20            # REDUCED: 20s (was 60s)
    wait_for_service_timeout: 1000        # 1s for service wait
    action_server_result_timeout: 60.0    # REDUCED: 60s (was 900s = 15 min!)

    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

    transform_tolerance: 1.0              # FIXED: was 0.5, caused TF Invalid errors

    # Error codes for proper feedback
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

###############################################################################
# CONTROLLER SERVER - FAST CONVERGENCE
###############################################################################
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0

    # Velocity thresholds (keep robot moving)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001       # FIXED: was 0.5 (way too high for diff drive!)
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 1.0

    # =========================================================================
    # PROGRESS CHECKER - FASTER STUCK DETECTION WITH ROTATION ALLOWANCE
    # =========================================================================
    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05      # REDUCED: 5cm (was 8cm) - detect stuck faster
      movement_time_allowance: 4.0        # REDUCED: 4s (was 5s) - faster recovery trigger

    # =========================================================================
    # GOAL CHECKER - PRECISE CONVERGENCE
    # =========================================================================
    goal_checker_plugins: ["general_goal_checker"]
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15             # 15cm position tolerance
      yaw_goal_tolerance: 6.28            # FULL CIRCLE: accept ANY orientation (was 0.50 - caused 180° failure!)
      stateful: true                      # Lock XY when reached

    controller_plugins: ["FollowPath"]
    odom_topic: /odometry/filtered

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # =======================================================================
      # VELOCITY - FAST GOAL REACH
      # =======================================================================
      desired_linear_vel: 0.25            # Target speed
      max_linear_accel: 0.25              # INCREASED: faster acceleration
      max_linear_decel: 0.50              # Quick comfortable braking

      # =======================================================================
      # LOOKAHEAD - LARGER TO HANDLE HEADING ERRORS
      # =======================================================================
      # LARGE lookahead helps find valid points even when heading is wrong
      lookahead_dist: 0.70                # INCREASED: helps with heading errors
      min_lookahead_dist: 0.50            # INCREASED: key for finding valid lookahead!
      max_lookahead_dist: 1.20            # INCREASED: longer prediction
      lookahead_time: 1.5                 # INCREASED: more time for prediction
      use_velocity_scaled_lookahead_dist: false  # DISABLED: keep constant lookahead

      # =======================================================================
      # ROTATION - DISABLED (prevents stuck rotation!)
      # =======================================================================
      use_rotate_to_heading: false        # CRITICAL FIX! (was true - caused stuck rotation)

      rotate_to_heading_min_angle: 0.35
      rotate_to_heading_angular_vel: 0.5
      max_angular_accel: 0.8
      allow_reversing: true               # ENABLED: wheelchair can back up safely

      # =======================================================================
      # APPROACH - SMOOTHER DECELERATION
      # =======================================================================
      transform_tolerance: 1.0            # INCREASED: was 0.5, prevents TF stale
      min_approach_linear_velocity: 0.05  # REDUCED: slower final approach for precision
      approach_velocity_scaling_dist: 0.6 # INCREASED: start slowing 60cm from goal

      use_collision_detection: false            # DISABLED: was stopping robot unnecessarily
      max_allowed_time_to_collision_up_to_carrot: 1.0

      # =======================================================================
      # VELOCITY REGULATION - AGGRESSIVE FORWARD MOTION
      # =======================================================================
      # FIX: Disable velocity scaling to prevent zero velocity output
      use_regulated_linear_velocity_scaling: false  # DISABLED: was reducing velocity to zero!
      use_cost_regulated_linear_velocity_scaling: false  # DISABLED: let costmap handle safety
      regulated_linear_scaling_min_radius: 0.2   # REDUCED: very tight turns allowed
      regulated_linear_scaling_min_speed: 0.15   # INCREASED: 15cm/s minimum!

      cost_scaling_dist: 0.25             # Match local inflation_radius for proper triggering
      cost_scaling_gain: 0.8              # INCREASED: less slowdown near obstacles (was 0.5)
      inflation_cost_scaling_factor: 2.5  # REDUCED: less aggressive cost scaling (was 3.0)

      use_fixed_curvature_lookahead: false  # DISABLED: allows smoother curves (was true)
      curvature_lookahead_dist: 0.35

      max_robot_pose_search_dist: 10.0
      interpolate_curvature_after_goal: false

###############################################################################
# LOCAL COSTMAP - LiDAR + STVL
###############################################################################
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05

      footprint: "[[0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35]]"
      footprint_padding: 0.03             # ADDED: 3cm extra safety margin
      transform_tolerance: 1.0            # INCREASED: was 0.5

      plugins: ["stvl_layer", "obstacle_layer", "inflation_layer"]

      # STVL - 3D obstacle detection (FIXED: faster decay + footprint clearing)
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 3.0                  # REDUCED: was 10.0, now 3s for faster clearing!
        decay_model: 0                     # 0 = linear decay
        voxel_size: 0.05
        track_unknown_space: false
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true     # Clear voxels in robot footprint
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: true
        transform_tolerance: 0.5
        mapping_mode: false
        map_save_duration: 60.0
        observation_sources: depth_camera

        depth_camera:
          data_type: PointCloud2
          topic: /camera/depth/color/points
          marking: true
          clearing: true
          obstacle_range: 3.5
          obstacle_max_range: 4.0
          obstacle_min_range: 0.85         # Filter out close objects (robot parts)
          min_obstacle_height: 0.15        # INCREASED: was 0.10, filter caster wheels
          max_obstacle_height: 1.80
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel"
          voxel_min_points: 0
          clear_after_reading: true
          max_z: 7.0
          min_z: 0.15                      # INCREASED: was 0.1, filter ground/casters
          vertical_fov_angle: 1.012
          horizontal_fov_angle: 1.518
          decay_acceleration: 10.0         # INCREASED: was 5.0, faster decay acceleration
          model_type: 0

      # LiDAR obstacle layer (FIXED: filter caster wheels)
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true   # Clear obstacles inside footprint
        max_obstacle_height: 2.0
        combination_method: 1

        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05        # INCREASED: was 0.0, filter ground reflections
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.30         # INCREASED: was 0.25, filter robot parts
          inf_is_valid: false

      # Inflation layer - REDUCED for narrow corridors
      # Previous 0.38m was blocking paths! Robot couldn't find any valid path.
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5              # Lower = costs extend further (safer paths)
        inflation_radius: 0.25                # REDUCED: allows passage in narrow corridors

      always_send_full_costmap: true
      track_unknown_space: true

###############################################################################
# GLOBAL COSTMAP
###############################################################################
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false

      footprint: "[[0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35]]"
      footprint_padding: 0.03             # ADDED: 3cm safety margin
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 1.0            # FIXED: was 0.5, caused TF errors

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
        map_topic: /map

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan

        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.25

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5              # Lower = costs extend further (safer paths)
        inflation_radius: 0.28                # REDUCED: was 0.40m, blocking all paths!

      always_send_full_costmap: true

###############################################################################
# PLANNER SERVER - SMAC Planner 2D
###############################################################################
planner_server:
  ros__parameters:
    expected_planner_frequency: 1.5       # INCREASED: faster replanning
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.10
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0              # REDUCED: faster planning (was 3.0)
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false

      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

###############################################################################
# SMOOTHER SERVER - OPTIMIZED FOR SMOOTH PATHS
###############################################################################
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 2000                       # INCREASED: more smoothing iterations
      do_refinement: true
      refinement_num: 3                   # INCREASED: more refinement passes
      w_smooth: 0.4                       # ADDED: weight on smoothness (higher = smoother)
      w_data: 0.2                         # ADDED: weight on original path data

###############################################################################
# BEHAVIOR SERVER - SMOOTH WHEELCHAIR-SAFE RECOVERY
###############################################################################
# TUNED: 2026-01-13 for passenger comfort
# - Added assisted_teleop for manual override
# - Reduced velocities for smoother recovery
# - Gentle acceleration limits
###############################################################################
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    use_sim_time: false

    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    wait:
      plugin: "nav2_behaviors::Wait"

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 1.0

    # WHEELCHAIR-SAFE recovery speeds (SMOOTH for passenger comfort)
    simulate_ahead_time: 2.0              # Look ahead for collision during recovery
    max_rotational_vel: 0.35              # REDUCED from 0.5 for smoother rotation
    min_rotational_vel: 0.10              # REDUCED from 0.15 for gentler start
    rotational_acc_lim: 0.5               # REDUCED from 0.8 for smoother acceleration

###############################################################################
# VELOCITY SMOOTHER - PASSENGER COMFORT OPTIMIZED
###############################################################################
# TUNED: 2026-01-13 for smooth wheelchair navigation
# Key changes:
# 1. smoothing_frequency: 40Hz for finer interpolation
# 2. scale_velocities: true for coordinated motion
# 3. Gentler acceleration/deceleration for comfort
###############################################################################
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 40.0             # DOUBLED: finer velocity interpolation
    scale_velocities: true                # ENABLED: coordinated velocity scaling
    feedback: "OPEN_LOOP"

    max_velocity: [0.25, 0.0, 0.35]       # REDUCED angular to 0.35 rad/s (was 0.50 - too fast!)
    min_velocity: [-0.12, 0.0, -0.35]     # Match max angular
    max_accel: [0.15, 0.0, 0.6]           # REDUCED: gentler acceleration (was 0.20, 1.0)
    max_decel: [-0.25, 0.0, -0.8]         # REDUCED: gentler braking (was -0.40, -1.0)

    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.0, 0.02]  # INCREASED: prevents motor jitter at near-zero
    velocity_timeout: 1.0

###############################################################################
# WAYPOINT FOLLOWER
###############################################################################
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200        # REDUCED: shorter pause (was 500)

###############################################################################
# COLLISION MONITOR - WHEELCHAIR FOOTPRINT AWARE
###############################################################################
# TUNED: 2026-01-13 for wheelchair safety
# Uses polygon zones matching wheelchair footprint (0.9m x 0.7m)
# StopZone: Just outside footprint (emergency stop)
# SlowdownZone: 0.5m buffer for comfortable deceleration
###############################################################################
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    cmd_vel_in_topic: "cmd_vel"
    cmd_vel_out_topic: "cmd_vel_safe"
    state_topic: "collision_monitor_state"
    transform_tolerance: 1.0              # INCREASED from 0.5
    source_timeout: 2.0
    base_shift_correction: true
    stop_pub_timeout: 2.0

    polygons: ["StopZone", "SlowdownZone"]

    # STOP ZONE - Wheelchair footprint + 10cm buffer
    # Footprint: 0.45m front, 0.35m sides -> Add 0.10m buffer
    StopZone:
      type: "polygon"
      points: [0.55, 0.42, 0.55, -0.42, -0.55, -0.42, -0.55, 0.42]
      action_type: "stop"
      max_points: 3                       # Stop if 3+ points in zone
      visualize: true
      polygon_pub_topic: "polygon_stop"

    # SLOWDOWN ZONE - Wheelchair footprint + 50cm buffer
    # Provides comfortable deceleration distance
    SlowdownZone:
      type: "polygon"
      points: [0.95, 0.82, 0.95, -0.82, -0.95, -0.82, -0.95, 0.82]
      action_type: "slowdown"
      max_points: 3
      slowdown_ratio: 0.3                 # Reduce to 30% speed
      visualize: true
      polygon_pub_topic: "polygon_slowdown"

    observation_sources: ["scan"]

    scan:
      type: "scan"
      topic: "/scan_filtered"
      min_range: 0.10                     # REDUCED from 0.30 for closer detection
      max_range: 10.0

###############################################################################
# SUMMARY OF NAVIGATION EXPERT OPTIMIZATIONS (2026-01-13)
###############################################################################
# ISSUES FIXED:
# 1. TF Invalid 35x (3.1%) → All transform_tolerance: 1.0s
# 2. AMCL Stale → update_min_d: 0.05 (was 0.01 - too aggressive!)
#                 laser_scan_timeout: 1.0s added
# 3. Navigation ABORTED → Smoother lookahead, velocity smoother tuned
# 4. Robot stuck 85% → Backup-first recovery, smooth recoveries
#
# SMOOTH NAVIGATION:
# - lookahead_dist: 0.50m (increased from 0.40)
# - min_lookahead_dist: 0.35m (increased from 0.20 - key for smooth!)
# - lookahead_time: 1.2s (increased from 0.8)
# - smoothing_frequency: 40Hz (doubled from 20)
# - scale_velocities: true (coordinated motion)
# - max_accel: [0.15, 0.0, 0.6] (gentler than [0.20, 0.0, 1.0])
#
# COLLISION AVOIDANCE:
# - Polygon StopZone: footprint + 10cm buffer
# - Polygon SlowdownZone: footprint + 50cm buffer
# - collision_monitor.min_range: 0.10m (reduced from 0.30)
#
# RECOVERY:
# - max_rotational_vel: 0.35 rad/s (reduced from 0.5)
# - rotational_acc_lim: 0.5 rad/s² (reduced from 0.8)
# - assisted_teleop plugin added
#
# INFLATION RADIUS (USER TUNED):
# - Local: 0.38m (narrow space friendly)
# - Global: 0.40m (safe path planning)
###############################################################################
