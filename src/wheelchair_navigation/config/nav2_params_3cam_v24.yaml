###############################################################################
# NAV2 PARAMETERS - 3-CAMERA SAFE WHEELCHAIR CONFIGURATION (v24)
###############################################################################
# DO NOT EDIT — create a new versioned file instead.
# Based on: nav2_params_3cam_v23.yaml
# Created: 2026-03-08
# Pairs with: wheelchair_fusion_nav.launch.py, scan_fusion_v9, 3x RealSense
#
#
# CHANGES vs v23 (RESTORE v17 HIGH-FREQUENCY RATES):
#
# v17 was best config: 7/9 goals, zero kidnapping, smooth motion.
# v19 halved controller/local/smoother rates for "CPU savings" but the
# real CPU problem was global costmap at 2Hz (v21), not these rates.
# v17 ran 20Hz controller + 5Hz local + 40Hz smoother on the same Jetson fine.
#
# Restoring v17 rates while keeping v19-v23 safety improvements:
#   controller_frequency: 10 -> 20 (50mm between corrections, not 100mm)
#   local costmap update: 3.0 -> 5.0 (faster obstacle response)
#   local costmap publish: 1.0 -> 2.0 (match v17)
#   smoothing_frequency: 20 -> 40 (smoother velocity output)
#   use_velocity_scaled_lookahead_dist: true -> false (fixed = predictable)
#   lookahead_dist: 0.80 -> 0.70 (v17 value — tighter tracking)
#   min_lookahead_dist: 0.60 -> 0.50 (v17 value)
#
# Kept from v19-v23 (genuine improvements over v17):
#   footprint_clearing_enabled: true (clears phantom obstacles)
#   obstacle_min_range: 0.40 (prevents self-marking)
#   inflation_radius: 0.62 (proper safety margin)
#   max_planning_time: 3.0 (more time for complex paths)
#   simulate_ahead_time: 1.0 (backup works in tight spaces)
#   global costmap update/publish: 1.0 (v23 fix, matches v17)
#   max_iterations: 500000 (reduced worst-case CPU)
#   tolerance: 0.20 (accept goals within 20cm)
#   cost_scaling_factor: 3.0 global (balanced gradient)
#
# CHANGES vs v21 (VERIFIED AGAINST NAV2 SOURCE CODE):
#
# Nav2 source code findings (Jazzy):
#   - SmacPlanner2D 2D mode ALWAYS uses radius-based collision (hardcoded).
#     The inflation ERROR is a warning, NOT a behavioral switch.
#   - Inflation formula: cost = 252 * exp(-k * (d - inscribed_radius))
#     For cost >= 128 at circumscribed (0.60m): k <= 2.7
#   - downsample_costmap uses MAX — obstacles become 2x wider. Don't use.
#   - StaticLayer OVERRIDES costmap resolution to match map (2cm).
#
# Problem 1: Global costmap 684K cells updated at 2Hz = 1.37M cells/sec.
#   Controller drops to 2.8 Hz (wavy motion). LOCAL costmap (10K cells)
#   handles real-time avoidance. Global only needs slow updates.
#   Fix: global update_frequency 2.0 -> 0.5, publish_frequency 1.0 -> 0.5
#
# Problem 2: downsample_costmap MAX makes obstacles 2x wider.
#   v21 used downsample=true,factor=2. Narrow passages became blocked.
#   18 planning failures for a goal that worked in v20.
#   Fix: downsample_costmap false (revert)
#
# Problem 3: cost_scaling_factor=5.0 decays too fast.
#   Cost at circumscribed = 72 (< 128). Poor gradient info for planner.
#   Fix: cost_scaling_factor 5.0 -> 3.0 (cost at circumscribed = 130)
#
# Problem 4: max_iterations=1M wastes CPU on impossible paths.
#   On 684K grid, worst case consumes 100% CPU for seconds.
#   Fix: max_iterations 1000000 -> 500000, tolerance 0.10 -> 0.20
#
# Problem 5: Backup always fails "Collision Ahead" (100%).
#   simulate_ahead_time=2.0 checks 0.30m behind at backup speed.
#   In tight spaces this always hits an inflated cell.
#   Fix: simulate_ahead_time 2.0 -> 1.0 (check 0.15m instead)
#
# All v21 changes preserved:
#   local obstacle_min_range=0.40, max_planning_time=3.0
# All v20/v19/v17 changes preserved:
#   sigma_hit=0.20, cost_travel_multiplier=1.0, controller_frequency=10,
#   SmacPlanner2D, lookahead tuning, footprint_clearing_enabled,
#   global obstacle_min_range=0.40, inflation_radius=0.62
#
# /scan_fused used everywhere.
# DO NOT EDIT — create a new versioned file instead.
###############################################################################
###############################################################################
# AMCL - RPLIDAR S3 OPTIMIZED
###############################################################################
amcl:
  ros__parameters:
    use_sim_time: false
    min_particles: 3000
    max_particles: 8000
    kld_err: 0.01
    kld_z: 0.99
    pf_err: 0.01
    pf_z: 0.99
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05
    alpha5: 0.05
    laser_model_type: "likelihood_field"
    max_beams: 360
    laser_max_range: 25.0
    laser_min_range: 0.05
    laser_likelihood_max_dist: 2.0
    sigma_hit: 0.20            # v17: anti-kidnap
    z_hit: 0.95
    z_rand: 0.04
    z_max: 0.005
    z_short: 0.005
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9
    update_min_d: 0.15
    update_min_a: 0.15
    laser_scan_timeout: 1.0
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    tf_broadcast: true
    transform_tolerance: 1.0
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    scan_topic: /scan_fused
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    initial_cov_xx: 0.15
    initial_cov_yy: 0.15
    initial_cov_aa: 0.12
    initial_cov_xy: 0.0
    initial_cov_xa: 0.0
    initial_cov_ya: 0.0
    always_reset_initial_pose: false
    first_map_only: false
    save_pose_rate: 10.0
    gui_publish_rate: 5.0

###############################################################################
# BT NAVIGATOR
###############################################################################
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 60.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    transform_tolerance: 1.0
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

###############################################################################
# CONTROLLER SERVER - JETSON-OPTIMIZED SMOOTH PATH FOLLOWING
###############################################################################
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0     # v24: restored v17 — 50mm between corrections (was 100mm at 10Hz)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0

    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 4.0

    goal_checker_plugins: ["general_goal_checker"]
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 6.28
      stateful: true

    controller_plugins: ["FollowPath"]
    odom_topic: /odometry/filtered

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.25
      max_linear_accel: 0.25
      max_linear_decel: 0.50
      lookahead_dist: 0.70        # v24: restored v17 — tighter path tracking
      min_lookahead_dist: 0.50    # v24: restored v17
      max_lookahead_dist: 1.20
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false   # v24: restored v17 — fixed lookahead = predictable straight tracking
      use_rotate_to_heading: false
      rotate_to_heading_min_angle: 0.35
      rotate_to_heading_angular_vel: 0.5
      max_angular_accel: 0.8
      allow_reversing: true
      transform_tolerance: 1.0
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.2
      regulated_linear_scaling_min_speed: 0.15
      cost_scaling_dist: 0.25
      cost_scaling_gain: 0.8
      inflation_cost_scaling_factor: 2.5
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.35
      max_robot_pose_search_dist: 10.0
      interpolate_curvature_after_goal: false

###############################################################################
# LOCAL COSTMAP - Jetson-optimized rates
###############################################################################
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0       # v24: restored v17 — faster obstacle response
      publish_frequency: 2.0      # v24: restored v17
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35]]"
      footprint_padding: 0.03
      transform_tolerance: 1.0
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        combination_method: 1

        scan:
          topic: /scan_fused
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.40          # v21: was 0.30 — inside inscribed radius caused self-marking
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.45

      always_send_full_costmap: false
      track_unknown_space: true

###############################################################################
# GLOBAL COSTMAP - /scan_fused with phantom obstacle fixes
###############################################################################
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0       # v23: was 0.5 — caused 'Costmap timed out' (4/9 failures). 1.0 worked in v20.
      publish_frequency: 1.0       # v23: was 0.5 — match update rate
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      footprint: "[[0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35]]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 1.0
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
        map_topic: /map

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true    # v19: clears phantom obstacles under robot

        scan:
          topic: /scan_fused
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.40          # v19: outside inscribed radius

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0   # v22: was 5.0 — cost=130 at circumscribed (source: Nav2 inflation formula)
        inflation_radius: 0.62       # v19: above circumscribed+padding

      always_send_full_costmap: false

###############################################################################
# PLANNER SERVER - SmacPlanner2D (CPU-optimized for 684K cell grid)
###############################################################################
planner_server:
  ros__parameters:
    expected_planner_frequency: 1.5
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.20             # v22: was 0.10 — accept goals within 20cm, faster convergence
      downsample_costmap: false    # v22: reverted — MAX downsampling blocks narrow passages
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 500000      # v22: was 1M — reduces worst-case CPU on 684K grid
      max_on_approach_iterations: 1000
      max_planning_time: 3.0
      cost_travel_multiplier: 1.0   # v17: shortest path
      use_final_approach_orientation: false

      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

###############################################################################
# SMOOTHER SERVER
###############################################################################
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 2000
      do_refinement: true
      refinement_num: 3
      w_smooth: 0.4
      w_data: 0.2

###############################################################################
# BEHAVIOR SERVER - WHEELCHAIR-SAFE RECOVERY
###############################################################################
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    use_sim_time: false
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 1.0
    simulate_ahead_time: 1.0      # v22: was 2.0 — check 0.15m behind (was 0.30m, always hitting inflated cells)
    max_rotational_vel: 0.35
    min_rotational_vel: 0.10
    rotational_acc_lim: 0.5

###############################################################################
# VELOCITY SMOOTHER - PASSENGER COMFORT (Jetson-optimized)
###############################################################################
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 40.0     # v24: restored v17 — smoother velocity output
    scale_velocities: true
    feedback: "OPEN_LOOP"
    max_velocity: [0.25, 0.0, 0.50]
    min_velocity: [-0.15, 0.0, -0.50]
    max_accel: [0.25, 0.0, 0.8]
    max_decel: [-0.25, 0.0, -0.8]
    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.0, 0.02]
    velocity_timeout: 1.0

###############################################################################
# WAYPOINT FOLLOWER
###############################################################################
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

###############################################################################
# COLLISION MONITOR (currently disabled via launch arg, wired for future use)
###############################################################################
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel"
    cmd_vel_out_topic: "cmd_vel_safe"
    state_topic: "collision_monitor_state"
    transform_tolerance: 1.0
    source_timeout: 2.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["StopZone", "SlowdownZone"]
    StopZone:
      type: "polygon"
      points: [0.55, 0.42, 0.55, -0.42, -0.55, -0.42, -0.55, 0.42]
      action_type: "stop"
      max_points: 3
      visualize: true
      polygon_pub_topic: "polygon_stop"
    SlowdownZone:
      type: "polygon"
      points: [0.95, 0.82, 0.95, -0.82, -0.95, -0.82, -0.95, 0.82]
      action_type: "slowdown"
      max_points: 3
      slowdown_ratio: 0.3
      visualize: true
      polygon_pub_topic: "polygon_slowdown"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan_fused"
      min_range: 0.10
      max_range: 10.0
