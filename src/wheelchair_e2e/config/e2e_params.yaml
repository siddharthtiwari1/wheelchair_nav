# E2E-2 BEV-Velocity CNN Parameters
e2e_velocity_node:
  ros__parameters:
    # Model
    model_path: ""  # Set to path of best_model.pth or TensorRT engine
    use_tensorrt: false
    v_max: 0.25     # m/s max linear velocity
    w_max: 1.0      # rad/s max angular velocity

    # Inference
    inference_hz: 15.0

    # Safety (hard limits independent of model)
    safety_min_range: 0.3   # meters — EMERGENCY STOP below this
    safety_slow_range: 0.6  # meters — slow down below this
    max_accel: 0.5          # m/s² — max linear acceleration
    max_alpha: 1.0          # rad/s² — max angular acceleration

safety_clamp_node:
  ros__parameters:
    emergency_stop_range: 0.3
    slowdown_range: 0.6
    slowdown_max_v: 0.1
    max_velocity: 0.25
    max_angular: 1.0
    input_topic: "/cmd_vel_raw"
    output_topic: "/cmd_vel"
    scan_topic: "/scan_fused"

goal_manager_node:
  ros__parameters:
    goal_reached_threshold: 0.5  # meters
