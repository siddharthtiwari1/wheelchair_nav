###############################################################################
# WHEELCHAIR DIFF-DRIVE CONTROLLER — SAFE VELOCITY LIMITS
###############################################################################
# DO NOT EDIT — create a new versioned file instead.
# Based on: wc_control.yaml
# Created: 2026-02-25
# Pairs with: unified_wheelchair.launch.py, wheelchair_interface.cpp
#
# SAFETY FIXES vs wc_control.yaml:
# 1. linear.x.max_velocity:  2.0 -> 0.30 m/s  (was 8x too high)
# 2. linear.x.min_velocity: -1.0 -> -0.20 m/s (was 5x too high)
# 3. angular.z.max_velocity: 3.0 -> 0.60 rad/s (was 5x too high)
# 4. linear.x.max_acceleration: 1.5 -> 0.30 m/s^2
# 5. angular.z.max_acceleration: 2.0 -> 0.80 rad/s^2
#
# WHY: DiffDriveController is the LAST software defense before Arduino.
# At 3.0 rad/s angular, each wheel spins at 5.56 m/s — dangerous with
# a passenger. These limits match the velocity_smoother caps (0.25/0.35)
# with a small margin for controller overshoot.
###############################################################################

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Controller definitions
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wc_control:
      type: diff_drive_controller/DiffDriveController

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    simple_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

# Differential Drive Controller Configuration
wc_control:
  ros__parameters:
    # Joint names - FIXED to use leftwheel/rightwheel
    left_wheel_names: ['leftwheel']
    right_wheel_names: ['rightwheel']

    # CRITICAL: Odometry feedback settings
    # open_loop: false = Use encoder feedback (closed-loop control)
    # position_feedback: false = Use velocity states directly (not differentiated from position)
    # WHY: Arduino sends at 20Hz, controller runs at 100Hz. With position_feedback: true,
    #      the controller differentiates position with its own dt, causing 35% velocity underestimation.
    #      With position_feedback: false, it uses the velocity values directly from hardware interface.
    open_loop: false
    position_feedback: false

    # Use stamped velocity commands (TwistStamped)
    use_stamped_vel: true

    # Publish rates and covariances
    publish_rate: 50.0
    pose_covariance_diagonal: [0.001, 0.001, 1.0e-3, 1.0e-3, 1.0e-3, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 1.0e-3, 1.0e-3, 1.0e-3, 0.01]

    # Wheel parameters - Physical measurements
    wheel_separation: 0.565  # Physical measurement
    wheel_radius: 0.1524     # ACTUAL 6-inch wheels (304.8mm diameter / 2)
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Command timeout
    cmd_vel_timeout: 0.5

    # Frame IDs (must match URDF)
    base_frame_id: base_link
    odom_frame_id: odom

    # Publishing options
    publish_limited_velocity: true
    publish_wheel_data: true
    enable_odom_tf: false  # DISABLED - EKF publishes odom->base_link (prevents TF conflict!)

    # Velocity and acceleration limits — SAFE for wheelchair with passenger
    # These are the LAST software defense before the Arduino hardware.
    # Margins above velocity_smoother caps (0.25 linear, 0.35 angular)
    # to allow controller tracking without saturation.
    linear:
      x:
        has_velocity_limts: true
        max_velocity: 0.30   # m/s  (was 2.0 — 8x too high!)
        min_velocity: -0.20  # m/s  (was -1.0 — 5x too high!)
        has_acceleration_limits: true
        max_acceleration: 0.30   # m/s^2  (was 1.5)
        min_acceleration: -0.50  # m/s^2  (was -1.0) — allow quick braking
        has_jerk_limits: false
        max_jerk: 5.0  # m/s^3

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 0.50   # rad/s  (was 3.0 — 5x too high!)
        has_acceleration_limits: true
        max_acceleration: 0.80  # rad/s^2  (was 2.0)
        has_jerk_limits: false
        max_jerk: 3.0  # rad/s^3

# Simple Velocity Controller Configuration (alternative/backup)
simple_velocity_controller:
  ros__parameters:
    joints:
      - leftwheel
      - rightwheel
    interface_name: velocity
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity

# Joint State Broadcaster Configuration
joint_state_broadcaster:
  ros__parameters:
    joints:
      - leftwheel
      - rightwheel

# IMU Sensor Broadcaster Configuration
imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: imu
    frame_id: base_link
    topic_name: ~/imu
