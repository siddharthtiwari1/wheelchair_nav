###############################################################################
# WHEELCHAIR DIFF-DRIVE CONTROLLER — NO VELOCITY LIMITS (CABLE TRACING)
###############################################################################
# DO NOT EDIT — create a new versioned file instead.
# Based on: wc_control_safe_v2.yaml
# Created: 2026-03-25
# Pairs with: wheelchair_cable_trace.launch.py
#
# PURPOSE: Cable tracing deployment — no DiffDriveController velocity/accel
# limits. The CNN model controls velocity directly.
#
# CHANGES vs wc_control_safe_v2.yaml:
#   1. All velocity limits DISABLED (has_velocity_limits: false)
#   2. All acceleration limits DISABLED (has_acceleration_limits: false)
#   3. Everything else IDENTICAL (wheel params, odom, timeouts, joints)
#
# WARNING: Only use for cable tracing. For autonomous nav use wc_control_safe_v2.yaml.
###############################################################################

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Controller definitions
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wc_control:
      type: diff_drive_controller/DiffDriveController

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    simple_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

# Differential Drive Controller Configuration
wc_control:
  ros__parameters:
    # Joint names
    left_wheel_names: ['leftwheel']
    right_wheel_names: ['rightwheel']

    # Odometry feedback settings (identical to safe_v2)
    open_loop: false
    position_feedback: false

    # Use stamped velocity commands (TwistStamped)
    use_stamped_vel: true

    # Publish rates and covariances
    publish_rate: 50.0
    pose_covariance_diagonal: [0.001, 0.001, 1.0e-3, 1.0e-3, 1.0e-3, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 1.0e-3, 1.0e-3, 1.0e-3, 0.01]

    # Wheel parameters - Physical measurements (identical to safe_v2)
    wheel_separation: 0.565
    wheel_radius: 0.1524
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Command timeout
    cmd_vel_timeout: 0.5

    # Frame IDs
    base_frame_id: base_link
    odom_frame_id: odom

    # Publishing options
    publish_limited_velocity: true
    publish_wheel_data: true
    enable_odom_tf: false  # EKF publishes odom->base_link

    # NO VELOCITY/ACCELERATION LIMITS — CNN controls velocity directly
    linear:
      x:
        has_velocity_limits: false
        has_acceleration_limits: false
        has_jerk_limits: false

    angular:
      z:
        has_velocity_limits: false
        has_acceleration_limits: false
        has_jerk_limits: false

# Simple Velocity Controller Configuration (alternative/backup)
simple_velocity_controller:
  ros__parameters:
    joints:
      - leftwheel
      - rightwheel
    interface_name: velocity
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity

# Joint State Broadcaster Configuration
joint_state_broadcaster:
  ros__parameters:
    joints:
      - leftwheel
      - rightwheel

# IMU Sensor Broadcaster Configuration
imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: imu
    frame_id: base_link
    topic_name: ~/imu
